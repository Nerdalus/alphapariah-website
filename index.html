  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-dim: #6b5a2e;
      --bg: #000;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--gold);
      font-family: 'Barlow', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    h1 {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: clamp(30px, 6.5vw, 64px);
      font-weight: 400;
      letter-spacing: 7px;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(201, 168, 76, 0.35);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    p {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: clamp(11px, 1.4vw, 14px);
      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold-dim);
      max-width: 720px;
      line-height: 2;
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <h1>Alpha Pariah Studios</h1>
  <p>Independent software house. Built for the long game.</p>
